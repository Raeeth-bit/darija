<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darija Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF7F2;
      --card-bg: #FFFFFF;
      --accent: #C25B3F;
      --accent-light: #F5EAE6;
      --text: #1C1410;
      --muted: #8A7E75;
      --border: #E8E0D6;
      --green: #3A7D5A;
      --green-light: #E8F3ED;
      --red: #C25B3F;
      --red-light: #F5EAE6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    header { text-align: center; margin-bottom: 2rem; }

    .logo {
      font-family: 'Amiri', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .logo-sub {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .controls {
      width: 100%;
      max-width: 420px;
      margin-bottom: 1.5rem;
    }

    .select-wrap { position: relative; }

    select {
      width: 100%;
      padding: 0.75rem 2.5rem 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      background: var(--card-bg);
      color: var(--text);
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    .select-arrow {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    .stats-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 0.75rem;
    }

    .stat-box {
      flex: 1;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0.6rem 0.75rem;
      text-align: center;
    }

    .stat-box .stat-num {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1;
    }

    .stat-box .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.15rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-box.good .stat-num { color: var(--green); }
    .stat-box.bad .stat-num { color: var(--accent); }
    .stat-box.total .stat-num { color: var(--text); }

    .progress-bar-wrap {
      width: 100%;
      max-width: 420px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .scene {
      width: 100%;
      max-width: 420px;
      height: 240px;
      perspective: 1200px;
      margin-bottom: 1rem;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border: 1.5px solid var(--border);
    }

    .face-front { background: var(--card-bg); }

    .face-back {
      background: var(--accent);
      transform: rotateY(180deg);
      border-color: var(--accent);
    }

    .face-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .face-front .face-label { color: var(--muted); }
    .face-back .face-label { color: rgba(255,255,255,0.6); }

    .face-word {
      font-size: 1.8rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }

    .face-front .face-word { color: var(--text); }

    .face-back .face-word {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: #fff;
    }

    .face-hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
    }

    .tap-hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1rem;
    }

    /* Boutons réponse — cachés tant que la carte n'est pas retournée */
    .btn-answer-row {
      display: none;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 0.75rem;
    }

    .btn-answer-row.visible { display: flex; }

    .btn {
      flex: 1;
      padding: 0.85rem 1rem;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.12s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-good {
      background: var(--green-light);
      color: var(--green);
    }

    .btn-bad {
      background: var(--accent-light);
      color: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }

    .btn-shuffle {
      flex: 1;
      padding: 0.85rem 1rem;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--accent-light);
      color: var(--accent);
      transition: transform 0.12s;
    }

    .btn-shuffle:active { transform: scale(0.97); }

    .empty-state {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 3rem 2rem;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1.5px solid var(--border);
      display: none;
    }

    .empty-state.visible { display: block; }
    .empty-state p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    .empty-state strong { color: var(--text); }

    .end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1.5px solid var(--border);
    }

    .end-screen.visible { display: flex; }
    .end-icon { font-size: 3rem; margin-bottom: 1rem; }
    .end-screen h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
    .end-screen p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }

    .btn-restart {
      background: var(--accent);
      color: white;
      padding: 0.85rem 2rem;
      border-radius: 14px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">دارجة</div>
  <div class="logo-sub">Flashcards · Arabe Marocain</div>
</header>

<div class="controls">
  <div class="select-wrap">
    <select id="chapterSelect" onchange="loadChapter()">
      <option value="all">Tous les chapitres (mélangés)</option>
    </select>
    <svg class="select-arrow" width="12" height="7" viewBox="0 0 12 7" fill="none">
      <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box good">
    <div class="stat-num" id="statGood">0</div>
    <div class="stat-label">✓ Acquises</div>
  </div>
  <div class="stat-box bad">
    <div class="stat-num" id="statBad">0</div>
    <div class="stat-label">✗ À revoir</div>
  </div>
  <div class="stat-box total">
    <div class="stat-num" id="statTotal">0</div>
    <div class="stat-label">Total</div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar" style="width: 0%"></div>
</div>

<div class="empty-state" id="emptyState">
  <div style="font-size:2.5rem; margin-bottom:1rem;">📂</div>
  <p>
    <strong>Aucune carte pour l'instant.</strong><br><br>
    Ouvre le fichier <strong>cartes.js</strong> et ajoute tes mots
    en suivant le format indiqué dans les commentaires.
  </p>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face-front">
      <div class="face-label">Français</div>
      <div class="face-word" id="wordFront">—</div>
    </div>
    <div class="face face-back">
      <div class="face-label">Darija</div>
      <div class="face-word" id="wordBack">—</div>
      <div class="face-hint" id="wordHint"></div>
    </div>
  </div>
</div>

<p class="tap-hint" id="tapHint">Appuie sur la carte pour voir la Darija</p>

<!-- Boutons visibles seulement après retournement -->
<div class="btn-answer-row" id="btnAnswer">
  <button class="btn btn-bad" onclick="answer(false)">✗ Je savais pas</button>
  <button class="btn btn-good" onclick="answer(true)">✓ Je savais</button>
</div>

<div class="btn-row" id="btnRow">
  <button class="btn-shuffle" onclick="loadChapter()">🔀 Recommencer</button>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-icon">🎉</div>
  <h2>Toutes les cartes acquises !</h2>
  <p id="endMsg"></p>
  <button class="btn-restart" onclick="loadChapter()">Recommencer</button>
</div>

<script src="cartes.js"></script>

<script>
  // ============================================================
  //  État de la session
  // ============================================================
  let allCards = [];       // toutes les cartes du chapitre
  let mastered = new Set(); // index des cartes acquises
  let failed = new Set();   // index des cartes ratées
  let queue = [];           // file de jeu en cours
  let currentCard = null;   // carte affichée
  let isFlipped = false;
  let roundCount = 0;       // nombre de passages total

  // ============================================================
  //  Init menu
  // ============================================================
  function buildChapterMenu() {
    const sel = document.getElementById('chapterSelect');
    while (sel.options.length > 1) sel.remove(1);
    if (!cardsData || cardsData.length === 0) return;
    const seen = new Map();
    cardsData.forEach(c => {
      if (!seen.has(c.ch)) seen.set(c.ch, c.chNom || `Chapitre ${c.ch}`);
    });
    seen.forEach((nom, ch) => {
      const opt = document.createElement('option');
      opt.value = ch;
      opt.textContent = `Ch.${ch} — ${nom}`;
      sel.appendChild(opt);
    });
  }

  // ============================================================
  //  Charger un chapitre
  // ============================================================
  function loadChapter() {
    const val = document.getElementById('chapterSelect').value;
    allCards = (!cardsData || cardsData.length === 0)
      ? []
      : val === 'all' ? [...cardsData] : cardsData.filter(c => c.ch === val);

    if (allCards.length === 0) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('scene').style.display = 'none';
      document.getElementById('tapHint').style.display = 'none';
      document.getElementById('btnAnswer').classList.remove('visible');
      document.getElementById('btnRow').style.display = 'none';
      document.getElementById('endScreen').classList.remove('visible');
      return;
    }

    mastered = new Set();
    failed = new Set();
    roundCount = 0;

    document.getElementById('emptyState').classList.remove('visible');
    document.getElementById('endScreen').classList.remove('visible');
    document.getElementById('scene').style.display = '';
    document.getElementById('tapHint').style.display = '';
    document.getElementById('btnRow').style.display = '';
    document.getElementById('statTotal').textContent = allCards.length;

    // Première queue : toutes les cartes mélangées
    queue = buildQueue();
    updateStats();
    nextCard();
  }

  // ============================================================
  //  Construire la file de jeu
  //  Cartes ratées + quelques cartes acquises mélangées dedans
  // ============================================================
  function buildQueue() {
    const notMastered = allCards
      .map((c, i) => i)
      .filter(i => !mastered.has(i));

    // On glisse quelques cartes acquises (max 20%) pour varier
    const masteredList = [...mastered];
    const bonus = shuffle(masteredList).slice(0, Math.ceil(masteredList.length * 0.2));

    return shuffle([...notMastered, ...bonus]);
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ============================================================
  //  Afficher la prochaine carte
  // ============================================================
  function nextCard() {
    if (queue.length === 0) {
      if (mastered.size === allCards.length) {
        showEnd();
        return;
      }
      // Reconstruire la file avec les cartes non acquises
      queue = buildQueue();
      roundCount++;
    }

    const idx = queue.shift();
    currentCard = { ...allCards[idx], idx };

    isFlipped = false;
    document.getElementById('btnAnswer').classList.remove('visible');
    document.getElementById('tapHint').style.display = '';

    const card = document.getElementById('card');
    card.classList.remove('flipped');

    setTimeout(() => {
      document.getElementById('wordFront').textContent = currentCard.f;
      document.getElementById('wordBack').textContent = currentCard.b;
      document.getElementById('wordHint').textContent = currentCard.chNom || `Chapitre ${currentCard.ch}`;
    }, 300);

    updateStats();
  }

  // ============================================================
  //  Retourner la carte
  // ============================================================
  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;
    document.getElementById('card').classList.add('flipped');
    setTimeout(() => {
      document.getElementById('btnAnswer').classList.add('visible');
      document.getElementById('tapHint').style.display = 'none';
    }, 400);
  }

  // ============================================================
  //  Réponse : je savais / je savais pas
  // ============================================================
  function answer(knew) {
    const idx = currentCard.idx;

    if (knew) {
      mastered.add(idx);
      failed.delete(idx);
    } else {
      failed.add(idx);
      mastered.delete(idx);
      // Remettre la carte dans la file dans 2-4 cartes
      const pos = Math.min(2 + Math.floor(Math.random() * 3), queue.length);
      queue.splice(pos, 0, idx);
    }

    updateStats();

    // Vérifier si tout est acquis
    if (mastered.size === allCards.length) {
      setTimeout(showEnd, 200);
      return;
    }

    // Passer à la suivante
    document.getElementById('btnAnswer').classList.remove('visible');
    const card = document.getElementById('card');
    card.classList.remove('flipped');
    setTimeout(() => {
      nextCard();
    }, 550);
  }

  // ============================================================
  //  Stats + barre de progression
  // ============================================================
  function updateStats() {
    const total = allCards.length;
    const good = mastered.size;
    const bad = failed.size;
    document.getElementById('statGood').textContent = good;
    document.getElementById('statBad').textContent = bad;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('progressBar').style.width = (good / total * 100) + '%';
  }

  // ============================================================
  //  Écran de fin
  // ============================================================
  function showEnd() {
    document.getElementById('endScreen').classList.add('visible');
    document.getElementById('scene').style.display = 'none';
    document.getElementById('tapHint').style.display = 'none';
    document.getElementById('btnAnswer').classList.remove('visible');
    document.getElementById('btnRow').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';

    const total = allCards.length;
    document.getElementById('endMsg').textContent =
      `Tu as validé les ${total} cartes en ${roundCount + 1} passage${roundCount > 0 ? 's' : ''}.`;
  }

  buildChapterMenu();
  loadChapter();
</script>
</body>
</html>
